# LiteLLM Proxy Configuration
# Credentials are NOT stored here - they're injected per-request via custom_auth

model_list:
  # OpenAI models

  # OpenAI wildcard - catches openai/<model-name> models from the built-in catalog
  - model_name: openai/*
    litellm_params:
      model: openai/*

  # Anthropic wildcard - catches anthropic/<model-name> models from the built-in catalog
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*

  # Gemini wildcard - catches gemini/<model-name> models
  - model_name: gemini/*
    litellm_params:
      model: gemini/*

  # Vertex AI wildcard - catches vertex_ai/<model-name> models
  - model_name: vertex_ai/*
    litellm_params:
      model: vertex_ai/*

  # Bedrock wildcard - catches dynamically-set ARN models (bedrock/arn:aws:...)
  - model_name: bedrock/*
    litellm_params:
      model: bedrock/*

  # Azure OpenAI wildcard - catches azure/<deployment-name> models
  - model_name: azure/*
    litellm_params:
      model: azure/*

  # Azure AI wildcard - catches azure_ai/<model-name> models
  - model_name: azure_ai/*
    litellm_params:
      model: azure_ai/*

  # Catch-all wildcard for any model not explicitly defined, for custom models
  - model_name: "*"
    litellm_params:
      model: openai/*

general_settings:
  custom_auth: tracecat.agent.gateway.user_api_key_auth
  database_url: null

litellm_settings:
  callbacks:
    - tracecat.agent.gateway.callback_handler
  drop_params: true
