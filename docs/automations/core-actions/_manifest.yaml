  - slug: memory-actions/tables
    title: Tables
    actions:
      - id: core.table.create_table
        info: |
          <Info>
            `columns` is a JSON array of column objects. Each object has
            required `name` and uppercase `type` fields, plus optional
            `nullable`, `default`, and `options` fields. Use `TEXT`,
            `INTEGER`, `NUMERIC`, `BOOLEAN`, `DATE`, `TIMESTAMPTZ`, `JSONB`,
            `SELECT`, or `MULTI_SELECT`. `options` is required for `SELECT`
            and `MULTI_SELECT`.
          </Info>
