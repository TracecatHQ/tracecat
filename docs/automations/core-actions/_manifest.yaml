  - slug: reshape
    title: Reshape
    actions:
      - id: core.transform.reshape
        info: |
          <Tip>
            `core.transform.reshape` evaluates expressions anywhere in the input
            value. Use it to extract fields, rename keys, hardcode values, and
            compose new objects or lists from trigger data and earlier actions.
          </Tip>
        examples:
          - reshape-single-value
          - reshape-build-object
          - reshape-inline-functions
        examples_note: |
          <Note>
            In the UI, Reshape uses the YAML editor. Define the output shape
            under `value:` in that editor.
          </Note>

