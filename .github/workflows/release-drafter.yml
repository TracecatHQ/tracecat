name: Update draft release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  main:
    runs-on: ubuntu-22.04
    steps:
      - name: Draft release
        uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
