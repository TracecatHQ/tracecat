name: Frontend code quality

on:
  push:
    branches: ["main"]
    paths:
      - frontend/**
      - tracecat/**
      - packages/**
      - .github/workflows/lint-frontend.yml
  pull_request:
    branches: ["main", "staging"]
    paths:
      - frontend/**
      - tracecat/**
      - packages/**
      - .github/workflows/lint-frontend.yml

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --no-install-project

      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2
        with:
          working-dir: frontend/
          version: 2.0.4

      - name: Run Biome
        working-directory: frontend
        run: biome ci .

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 9
          run_install: false

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Check frontend client is up to date
        run: |
          pnpm -C frontend generate-client-ci
          # openapi-ts output style doesn't match repo formatting; normalize generated client only
          pnpm -C frontend exec biome check --write src/client
          git diff --exit-code frontend/src/client/

      - name: Run TypeScript type check
        working-directory: frontend
        run: pnpm run typecheck
