type: action
definition:
  title: Batch create KV entries
  description: Create multiple new entries in a Splunk KV Store collection at once.
  display_group: Splunk
  doc_url: https://help.splunk.com/en/splunk-enterprise/rest-api-reference/9.4/kv-store-endpoints/kv-store-endpoint-descriptions#post-2
  namespace: tools.splunk
  name: batch_create_kv_entries
  secrets:
    - name: splunk
      keys: ["SPLUNK_API_KEY"]
  expects:
    collection:
      type: str
      description: Name of the KV Store collection where the entry will be created.
    entries:
      type: list[dict[str, Any]]
      description: |
        List of key-value pairs to store in the collection. The _key field is automatically
        generated by Splunk if not provided. Note the maximum number of entries you can create in a single request is 1000 by default for Splunk. 
        Example: [{"username": "john", "email": "john@example.com", "active": true}, {"username": "jane", "email": "jane@example.com", "active": false}]
    base_url:
      type: str | None
      description: Splunk base URL (e.g. https://localhost:8089 or https://tracecat.splunkcloud.com:8089).
      default: null
    owner:
      type: str
      description: Splunk namespace owner for access control (use "nobody" for shared access).
      default: nobody
    app:
      type: str
      description: Splunk app context where the collection resides (e.g. "search" for default).
      default: search
    verify_ssl:
      type: bool
      description: Whether to verify SSL certificates.
      default: true
  steps:
    - ref: batch_create_entries
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.splunk.base_url }}/servicesNS/${{ inputs.owner }}/${{ inputs.app }}/storage/collections/data/${{ inputs.collection }}/batch_save
        method: POST
        verify_ssl: ${{ inputs.verify_ssl }}
        headers:
          Authorization: Bearer ${{ SECRETS.splunk.SPLUNK_API_KEY }}
          Content-Type: application/json
          Accept: application/json
        payload: ${{ inputs.entries }}
  returns: ${{ steps.batch_create_entries.result.data }}
