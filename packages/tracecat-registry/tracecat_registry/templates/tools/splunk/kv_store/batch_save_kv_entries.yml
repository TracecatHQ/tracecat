type: action
definition:
  title: Batch save KV entries
  description: >-
    Insert or update multiple entries in a Splunk KV Store collection in a single request.
    If an entry includes a _key that matches an existing document, it is updated;
    otherwise a new document is created. Processing stops on the first failure.
  display_group: Splunk
  doc_url: https://help.splunk.com/en/splunk-cloud-platform/leverage-rest-apis/rest-api-reference/10.0.2503/kv-store-endpoints/kv-store-endpoint-descriptions#ariaid-title16
  namespace: tools.splunk
  name: batch_save_kv_entries
  secrets:
    - name: splunk
      keys: ["SPLUNK_API_KEY"]
  expects:
    collection:
      type: str
      description: Name of the KV Store collection to save entries into.
    entries:
      type: list[dict[str, Any]]
      description: |
        List of documents to save. Each document is a dict of field-value pairs.
        Include a _key field to update an existing document; omit it to create a new one
        (Splunk auto-generates the key). Maximum 1000 documents per request (Splunk default).
        Example: [{"username": "john", "email": "john@example.com", "active": true}, {"username": "jane", "email": "jane@example.com", "active": false}]
    base_url:
      type: str | None
      description: Splunk base URL (e.g. https://localhost:8089 or https://tracecat.splunkcloud.com:8089).
      default: null
    owner:
      type: str
      description: Splunk namespace owner for access control (use "nobody" for shared access).
      default: nobody
    app:
      type: str
      description: Splunk app context where the collection resides (e.g. "search" for default).
      default: search
    verify_ssl:
      type: bool
      description: Whether to verify SSL certificates.
      default: true
  steps:
    - ref: batch_create_entries
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.splunk.base_url }}/servicesNS/${{ inputs.owner }}/${{ inputs.app }}/storage/collections/data/${{ inputs.collection }}/batch_save
        method: POST
        verify_ssl: ${{ inputs.verify_ssl }}
        headers:
          Authorization: Bearer ${{ SECRETS.splunk.SPLUNK_API_KEY }}
          Content-Type: application/json
          Accept: application/json
        payload: ${{ inputs.entries }}
  returns: ${{ steps.batch_create_entries.result.data }}
