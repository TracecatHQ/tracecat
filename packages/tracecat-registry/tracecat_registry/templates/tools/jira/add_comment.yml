type: action
definition:
  title: Add comment to issue
  description: Add a comment to an issue in Jira.
  display_group: Jira
  doc_url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issue-comments/#api-rest-api-3-issue-issueidorkey-comment-post
  namespace: tools.jira
  name: add_issue_comment
  secrets:
    - name: jira
      keys: ["JIRA_USEREMAIL", "JIRA_API_TOKEN"]
  expects:
    issue_id_or_key:
      type: str
      description: ID or key of the issue to add a comment to.
    comment:
      type: str | dict[str, Any]
      description: >-
        Comment to add to the issue. Plain strings are wrapped as ADF text
        paragraphs. ADF JSON strings are deserialized. Dictionaries are sent as
        Jira's native comment payload shape, or wrapped as `body` when they are
        ADF documents.
    base_url:
      type: str | None
      description: Jira tenant URL (e.g. https://your-domain.atlassian.net).
      default: null
  steps:
    - ref: build_payload
      action: core.script.run_python
      args:
        inputs:
          comment: ${{ inputs.comment }}
        script: |
          import json

          def _is_adf_doc(value):
              return (
                  isinstance(value, dict)
                  and value.get("version") == 1
                  and value.get("type") == "doc"
                  and isinstance(value.get("content"), list)
              )

          def _plain_text_adf(text):
              return {
                  "version": 1,
                  "type": "doc",
                  "content": [
                      {
                          "type": "paragraph",
                          "content": [{"type": "text", "text": text}],
                      }
                  ],
              }

          def _rich_text_adf(value):
              if isinstance(value, dict):
                  return value
              try:
                  parsed = json.loads(value)
              except (TypeError, ValueError):
                  return _plain_text_adf(value)
              return parsed if _is_adf_doc(parsed) else _plain_text_adf(value)

          def main(comment):
              if isinstance(comment, dict) and not _is_adf_doc(comment):
                  return comment
              return {"body": _rich_text_adf(comment)}
    - ref: add_comment
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.jira.base_url }}/rest/api/3/issue/${{ inputs.issue_id_or_key }}/comment
        method: POST
        auth:
          username: ${{ SECRETS.jira.JIRA_USEREMAIL }}
          password: ${{ SECRETS.jira.JIRA_API_TOKEN }}
        payload: ${{ steps.build_payload.result }}
  returns: ${{ steps.add_comment.result.data }}
