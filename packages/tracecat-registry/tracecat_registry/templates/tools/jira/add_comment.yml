type: action
definition:
  title: Add comment to issue
  description: Add a comment to an issue in Jira.
  display_group: Jira
  doc_url: https://developer.atlassian.com/cloud/jira/platform/rest/v3/api-group-issue-comments/#api-rest-api-3-issue-issueidorkey-comment-post
  namespace: tools.jira
  name: add_issue_comment
  secrets:
    - name: jira
      keys: ["JIRA_USEREMAIL", "JIRA_API_TOKEN"]
  expects:
    issue_id_or_key:
      type: str
      description: ID or key of the issue to add a comment to.
    comment:
      type: str | dict[str, Any]
      description: >-
        Comment to add to the issue. Plain strings are wrapped as ADF text
        paragraphs. JSON object strings are deserialized. Dictionaries are sent
        as the Jira comment `body` value.
    base_url:
      type: str | None
      description: Jira tenant URL (e.g. https://your-domain.atlassian.net).
      default: null
  steps:
    - ref: build_payload
      action: core.script.run_python
      args:
        inputs:
          comment: ${{ inputs.comment }}
        script: |
          import json

          def main(comment):
              if isinstance(comment, dict):
                  return {"body": comment}
              try:
                  parsed = json.loads(comment)
              except (TypeError, ValueError):
                  parsed = None
              return {
                  "body": parsed
                  if isinstance(parsed, dict)
                  else {
                      "version": 1,
                      "type": "doc",
                      "content": [
                          {
                              "type": "paragraph",
                              "content": [{"type": "text", "text": comment}],
                          }
                      ],
                  }
              }
    - ref: add_comment
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.jira.base_url }}/rest/api/3/issue/${{ inputs.issue_id_or_key }}/comment
        method: POST
        auth:
          username: ${{ SECRETS.jira.JIRA_USEREMAIL }}
          password: ${{ SECRETS.jira.JIRA_API_TOKEN }}
        payload: ${{ steps.build_payload.result }}
  returns: ${{ steps.add_comment.result.data }}
