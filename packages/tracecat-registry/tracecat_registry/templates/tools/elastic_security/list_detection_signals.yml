type: action
definition:
  title: List detection alerts
  description: Query for Elastic Security detection alerts.
  display_group: Elastic Security
  doc_url: https://www.elastic.co/docs/api/doc/kibana/v8/operation/operation-searchalerts
  namespace: tools.elastic_security
  name: list_detection_signals
  secrets:
    - name: elastic_security
      keys: ["ELASTIC_API_KEY"]
  expects:
    start_time:
      type: datetime
      description: Start time for the query (inclusive).
    end_time:
      type: datetime
      description: End time for the query (exclusive).
    query:
      type: str | dict[str, Any] | None
      description: Elastic JSON query DSL. If specified, overrides `start_time` and `end_time`.
      default: null
    limit:
      type: int
      description: Maximum number of alerts to return.
      default: 100
    source_fields:
      type: list[str] | dict[str, Any] | None
      description: |
        Source field filter applied to each alert. Pass a list of dotted field
        names to include only those fields, or a dict of `includes` / `excludes`
        for fine-grained control. Maps directly to the Kibana `_source` request
        body parameter. When `null` (default), every field is returned.
      default: null
    base_url:
      type: str | None
      description: Kibana endpoint URL (e.g. https://localhost:5601).
      default: null
    verify_ssl:
      type: bool
      description: Whether to verify SSL certificates.
      default: true
  steps:
    - ref: search_query
      action: core.transform.reshape
      args:
        value:
          bool:
            filter:
              - range:
                  "@timestamp":
                    gte: ${{ inputs.start_time }}
                    lt: ${{ inputs.end_time }}
            # Exclude building block alerts to reduce noise
            must_not:
              - exists:
                  field: kibana.alert.building_block_type
    - ref: build_search_payload
      action: core.script.run_python
      args:
        inputs:
          start_time: ${{ inputs.start_time }}
          end_time: ${{ inputs.end_time }}
          query: ${{ inputs.query || steps.search_query.result }}
          limit: ${{ inputs.limit }}
          source_fields: ${{ inputs.source_fields }}
        script: |
          def main(start_time, end_time, query, limit, source_fields):
              payload = {
                  "start": start_time,
                  "end": end_time,
                  "query": query,
                  "size": limit,
              }
              if source_fields is not None:
                  payload["_source"] = source_fields
              return payload
    - ref: query_detection_alerts
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.elastic_security.base_url }}/api/detection_engine/signals/search
        method: POST
        verify_ssl: ${{ inputs.verify_ssl }}
        headers:
          kbn-xsrf: kibana
          Authorization: ApiKey ${{ SECRETS.elastic_security.ELASTIC_API_KEY }}
        payload: ${{ steps.build_search_payload.result }}
  returns: ${{ steps.query_detection_alerts.result.data }}
