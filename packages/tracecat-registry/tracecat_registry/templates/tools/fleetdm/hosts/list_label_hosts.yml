type: action
definition:
  title: List hosts in label
  description: List the hosts that are members of a given label.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-hosts-in-a-label
  namespace: tools.fleetdm
  name: list_label_hosts
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    label_id:
      type: int
      description: Numeric Fleet label ID.
    query:
      type: str | None
      description: Search string matched against hostname, IP, serial, and UUID.
      default: null
    status:
      type: str | None
      description: Host status filter (online, offline, new, mia, missing).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Hosts per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: label_hosts
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/labels/${{ inputs.label_id }}/hosts
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          query: ${{ inputs.query }}
          status: ${{ inputs.status }}
          page: ${{ inputs.page }}
          per_page: ${{ inputs.per_page }}
  returns: ${{ steps.label_hosts.result.data }}
