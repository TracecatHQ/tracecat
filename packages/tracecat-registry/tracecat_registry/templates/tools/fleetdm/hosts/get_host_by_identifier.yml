type: action
definition:
  title: Get host by identifier
  description: Get full details for a single host by hostname, UUID, serial, or node key.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-host-by-identifier
  namespace: tools.fleetdm
  name: get_host_by_identifier
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    identifier:
      type: str
      description: Host hostname, UUID, hardware serial, osquery host ID, or node key.
    exclude_software:
      type: bool | None
      description: If true, omit the host's installed software from the response.
      default: null
    exclude_fleet_maintained_policies:
      type: bool | None
      description: If true, omit Fleet-maintained policies from the host's policy list.
      default: null
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            exclude_software: ${{ inputs.exclude_software }}
            exclude_fleet_maintained_policies: ${{ inputs.exclude_fleet_maintained_policies }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: get_host
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/identifier/${{ FN.url_encode(inputs.identifier) }}
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.get_host.result.data }}
