type: action
definition:
  title: List fleets
  description: List fleets (teams) used to scope hosts, policies, and queries.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-fleets
  namespace: tools.fleetdm
  name: list_fleets
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    query:
      type: str | None
      description: Search string matched against fleet name.
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Fleets per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            query: ${{ inputs.query }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: list_fleets
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/fleets
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.list_fleets.result.data }}
