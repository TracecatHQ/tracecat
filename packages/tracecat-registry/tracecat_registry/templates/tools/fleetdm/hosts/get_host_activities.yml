type: action
definition:
  title: Get host activities
  description: List the past activity audit trail for a single host.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-hosts-past-activity
  namespace: tools.fleetdm
  name: get_host_activities
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_id:
      type: int
      description: Numeric Fleet host ID.
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Activities per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: host_activities
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/${{ inputs.host_id }}/activities
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          page: ${{ inputs.page }}
          per_page: ${{ inputs.per_page }}
  returns: ${{ steps.host_activities.result.data }}
