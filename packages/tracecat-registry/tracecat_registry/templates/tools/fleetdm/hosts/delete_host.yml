type: action
definition:
  title: Delete host
  description: Delete a host from Fleet by its numeric ID.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#delete-host
  namespace: tools.fleetdm
  name: delete_host
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_id:
      type: int
      description: Numeric Fleet host ID.
  steps:
    - ref: delete_host
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/${{ inputs.host_id }}
        method: DELETE
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
  returns: ${{ steps.delete_host.result.data }}
