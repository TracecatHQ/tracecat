type: action
definition:
  title: List host software
  description: List the software installed on a host along with detected vulnerabilities.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-hosts-software
  namespace: tools.fleetdm
  name: list_host_software
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_id:
      type: int
      description: Numeric Fleet host ID.
    query:
      type: str | None
      description: Search string matched against software name.
      default: null
    vulnerable:
      type: bool | None
      description: Only include software with known vulnerabilities.
      default: null
    min_cvss_score:
      type: float | None
      description: Only include software with a vulnerability at or above this CVSS score.
      default: null
    max_cvss_score:
      type: float | None
      description: Only include software with a vulnerability at or below this CVSS score.
      default: null
    exploit:
      type: bool | None
      description: Only include software with a CISA known-exploited vulnerability.
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Software entries per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: host_software
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/${{ inputs.host_id }}/software
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          query: ${{ inputs.query }}
          vulnerable: ${{ inputs.vulnerable }}
          min_cvss_score: ${{ inputs.min_cvss_score }}
          max_cvss_score: ${{ inputs.max_cvss_score }}
          exploit: ${{ inputs.exploit }}
          page: ${{ inputs.page }}
          per_page: ${{ inputs.per_page }}
  returns: ${{ steps.host_software.result.data }}
