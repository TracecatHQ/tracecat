type: action
definition:
  title: List hosts
  description: List and search hosts enrolled in Fleet with server-side filters.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-hosts
  namespace: tools.fleetdm
  name: list_hosts
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    status:
      type: str | None
      description: Host status filter (online, offline, new, mia, missing).
      default: null
    query:
      type: str | None
      description: Search string matched against hostname, IP, serial, and UUID.
      default: null
    fleet_id:
      type: int | None
      description: Scope results to a fleet (team) ID.
      default: null
    policy_id:
      type: int | None
      description: Filter by hosts evaluated against this policy ID (pair with policy_response).
      default: null
    policy_response:
      type: str | None
      description: Policy compliance filter for policy_id (passing or failing).
      default: null
    software_version_id:
      type: int | None
      description: Only include hosts that have this software version installed.
      default: null
    vulnerability:
      type: str | None
      description: Only include hosts affected by this CVE (e.g. CVE-2024-1234).
      default: null
    mdm_enrollment_status:
      type: str | None
      description: MDM enrollment filter (manual, automatic, enrolled, pending, unenrolled).
      default: null
    os_settings_disk_encryption:
      type: str | None
      description: Disk encryption status filter (verified, verifying, action_required, enforcing, failed, removing_enforcement).
      default: null
    os_name:
      type: str | None
      description: Operating system name filter (must be paired with os_version).
      default: null
    os_version:
      type: str | None
      description: Operating system version filter (must be paired with os_name).
      default: null
    low_disk_space:
      type: int | None
      description: Only include hosts with less than this many GB of disk space.
      default: null
    populate_software:
      type: bool | None
      description: Include each host's installed software in the response.
      default: null
    populate_policies:
      type: bool | None
      description: Include each host's policy compliance in the response.
      default: null
    order_key:
      type: str | None
      description: Column to sort hosts by.
      default: null
    order_direction:
      type: str | None
      description: Sort direction (asc or desc); requires order_key.
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Hosts per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            status: ${{ inputs.status }}
            query: ${{ inputs.query }}
            fleet_id: ${{ inputs.fleet_id }}
            policy_id: ${{ inputs.policy_id }}
            policy_response: ${{ inputs.policy_response }}
            software_version_id: ${{ inputs.software_version_id }}
            vulnerability: ${{ inputs.vulnerability }}
            mdm_enrollment_status: ${{ inputs.mdm_enrollment_status }}
            os_settings_disk_encryption: ${{ inputs.os_settings_disk_encryption }}
            os_name: ${{ inputs.os_name }}
            os_version: ${{ inputs.os_version }}
            low_disk_space: ${{ inputs.low_disk_space }}
            populate_software: ${{ inputs.populate_software }}
            populate_policies: ${{ inputs.populate_policies }}
            order_key: ${{ inputs.order_key }}
            order_direction: ${{ inputs.order_direction }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: list_hosts
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.list_hosts.result.data }}
