type: action
definition:
  title: List activities
  description: List the global audit log of actions performed in Fleet.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-activities
  namespace: tools.fleetdm
  name: list_activities
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    query:
      type: str | None
      description: Search string matched against actor name and email.
      default: null
    order_key:
      type: str | None
      description: Field to order by (e.g. created_at).
      default: null
    order_direction:
      type: str | None
      description: Sort direction (asc or desc).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Activities per page.
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            query: ${{ inputs.query }}
            order_key: ${{ inputs.order_key }}
            order_direction: ${{ inputs.order_direction }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: list_activities
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/activities
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.list_activities.result.data }}
