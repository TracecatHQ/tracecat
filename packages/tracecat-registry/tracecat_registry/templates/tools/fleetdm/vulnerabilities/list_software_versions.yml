type: action
definition:
  title: List software versions
  description: List software versions across the fleet with their associated CVEs.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-software-versions
  namespace: tools.fleetdm
  name: list_software_versions
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    query:
      type: str | None
      description: Search string matched against software name and CVE.
      default: null
    vulnerable:
      type: bool | None
      description: Only include versions with known vulnerabilities.
      default: null
    min_cvss_score:
      type: float | None
      description: Only include versions with a vulnerability at or above this CVSS score.
      default: null
    max_cvss_score:
      type: float | None
      description: Only include versions with a vulnerability at or below this CVSS score.
      default: null
    exploit:
      type: bool | None
      description: Only include versions with a CISA known-exploited vulnerability.
      default: null
    fleet_id:
      type: int | None
      description: Scope results to a fleet (team) ID.
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Software versions per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            query: ${{ inputs.query }}
            vulnerable: ${{ inputs.vulnerable }}
            min_cvss_score: ${{ inputs.min_cvss_score }}
            max_cvss_score: ${{ inputs.max_cvss_score }}
            exploit: ${{ inputs.exploit }}
            fleet_id: ${{ inputs.fleet_id }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: software_versions
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/software/versions
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.software_versions.result.data }}
