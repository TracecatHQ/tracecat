type: action
definition:
  title: List OS versions
  description: List operating system versions across hosts with detected vulnerabilities.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-operating-systems
  namespace: tools.fleetdm
  name: list_os_versions
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    fleet_id:
      type: int | None
      description: Scope results to a fleet (team) ID.
      default: null
    platform:
      type: str | None
      description: Platform filter (darwin, windows, linux, chrome).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: OS versions per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            fleet_id: ${{ inputs.fleet_id }}
            platform: ${{ inputs.platform }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: os_versions
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/os_versions
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.os_versions.result.data }}
