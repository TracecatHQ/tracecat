type: action
definition:
  title: List vulnerabilities
  description: List CVEs affecting software and operating systems across the fleet.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-vulnerabilities
  namespace: tools.fleetdm
  name: list_vulnerabilities
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    query:
      type: str | None
      description: Search string matched against CVE identifiers.
      default: null
    exploit:
      type: bool | None
      description: Only include CVEs with a CISA known-exploited vulnerability (Fleet Premium).
      default: null
    fleet_id:
      type: int | None
      description: Scope results to a fleet (team) ID.
      default: null
    order_key:
      type: str | None
      description: Field to order by (cve, cvss_score, epss_probability, cve_published, host_count).
      default: null
    order_direction:
      type: str | None
      description: Sort direction (asc or desc).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Vulnerabilities per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            query: ${{ inputs.query }}
            exploit: ${{ inputs.exploit }}
            fleet_id: ${{ inputs.fleet_id }}
            order_key: ${{ inputs.order_key }}
            order_direction: ${{ inputs.order_direction }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: list_vulnerabilities
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/vulnerabilities
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.list_vulnerabilities.result.data }}
