type: action
definition:
  title: List reports
  description: List the saved reports (saved queries) defined in Fleet.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-reports
  namespace: tools.fleetdm
  name: list_reports
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    fleet_id:
      type: int | None
      description: Scope reports to a fleet (team) ID.
      default: null
    query:
      type: str | None
      description: Search string matched against report name.
      default: null
    platform:
      type: str | None
      description: Platform filter (macos, windows, linux, chrome).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Reports per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            fleet_id: ${{ inputs.fleet_id }}
            query: ${{ inputs.query }}
            platform: ${{ inputs.platform }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: list_reports
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/reports
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.list_reports.result.data }}
