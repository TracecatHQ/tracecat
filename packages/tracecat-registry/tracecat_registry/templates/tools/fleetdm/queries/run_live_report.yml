type: action
definition:
  title: Run live report
  description: Run a saved report live against target hosts and return results synchronously.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#run-live-report
  namespace: tools.fleetdm
  name: run_live_report
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    report_id:
      type: int
      description: Numeric Fleet report ID to run.
    host_ids:
      type: list[int]
      description: Numeric IDs of the hosts to run the report against.
  steps:
    - ref: run_live_report
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/reports/${{ inputs.report_id }}/run
        method: POST
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
          Content-Type: application/json
        payload:
          host_ids: ${{ inputs.host_ids }}
  returns: ${{ steps.run_live_report.result.data }}
