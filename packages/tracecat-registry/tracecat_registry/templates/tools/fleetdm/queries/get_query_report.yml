type: action
definition:
  title: Get query report
  description: Get the most recent saved (scheduled) results for a query.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-query-report
  namespace: tools.fleetdm
  name: get_query_report
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    query_id:
      type: int
      description: Numeric Fleet query (report) ID.
  steps:
    - ref: query_report
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/reports/${{ inputs.query_id }}/report
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
  returns: ${{ steps.query_report.result.data }}
