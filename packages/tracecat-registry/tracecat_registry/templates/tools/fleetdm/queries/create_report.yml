type: action
definition:
  title: Create report
  description: Create a saved report (saved query) in Fleet.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#create-report
  namespace: tools.fleetdm
  name: create_report
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    name:
      type: str
      description: Name of the saved report.
    query:
      type: str
      description: The SQL query the report collects data with.
    description:
      type: str | None
      description: Human-readable description of the report.
      default: null
    platform:
      type: str | None
      description: Comma-separated platforms the report targets (e.g. darwin,windows,linux).
      default: null
    fleet_id:
      type: int | None
      description: Fleet (team) ID to scope the report to.
      default: null
    interval:
      type: int | None
      description: Schedule interval in seconds (0 or null for an unscheduled report).
      default: null
  steps:
    - ref: build_payload
      action: core.script.run_python
      args:
        inputs:
          name: ${{ inputs.name }}
          query: ${{ inputs.query }}
          description: ${{ inputs.description }}
          platform: ${{ inputs.platform }}
          fleet_id: ${{ inputs.fleet_id }}
          interval: ${{ inputs.interval }}
        script: |
          def main(name, query, description, platform, fleet_id, interval):
              payload = {"name": name, "query": query}
              if description is not None:
                  payload["description"] = description
              if platform is not None:
                  payload["platform"] = platform
              if fleet_id is not None:
                  payload["fleet_id"] = fleet_id
              if interval is not None:
                  payload["interval"] = interval
              return payload
    - ref: create_report
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/reports
        method: POST
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
          Content-Type: application/json
        payload: ${{ steps.build_payload.result }}
  returns: ${{ steps.create_report.result.data }}
