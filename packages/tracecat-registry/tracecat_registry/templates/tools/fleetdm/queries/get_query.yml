type: action
definition:
  title: Get query
  description: Get a single saved osquery query (report) by its ID.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-query
  namespace: tools.fleetdm
  name: get_query
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    query_id:
      type: int
      description: Numeric Fleet query (report) ID.
  steps:
    - ref: get_query
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/reports/${{ inputs.query_id }}
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
  returns: ${{ steps.get_query.result.data }}
