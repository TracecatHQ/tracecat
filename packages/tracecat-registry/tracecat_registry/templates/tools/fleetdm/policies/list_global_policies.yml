type: action
definition:
  title: List global policies
  description: List global compliance policies with their passing and failing host counts.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-global-policies
  namespace: tools.fleetdm
  name: list_global_policies
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    order_key:
      type: str | None
      description: Field to order policies by (e.g. name, failing_host_count).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Policies per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: list_policies
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/global/policies
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          order_key: ${{ inputs.order_key }}
          page: ${{ inputs.page }}
          per_page: ${{ inputs.per_page }}
  returns: ${{ steps.list_policies.result.data }}
