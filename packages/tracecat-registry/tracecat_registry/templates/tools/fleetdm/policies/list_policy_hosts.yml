type: action
definition:
  title: List policy hosts
  description: List the hosts that pass or fail a given policy.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-hosts
  namespace: tools.fleetdm
  name: list_policy_hosts
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    policy_id:
      type: int
      description: Numeric Fleet policy ID.
    policy_response:
      type: str
      description: Compliance filter (passing or failing).
      default: failing
    fleet_id:
      type: int | None
      description: Scope results to a fleet (team) ID.
      default: null
    platform:
      type: str | None
      description: Platform filter (darwin, windows, linux, chrome, ios, ipados).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Hosts per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: policy_hosts
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          policy_id: ${{ inputs.policy_id }}
          policy_response: ${{ inputs.policy_response }}
          fleet_id: ${{ inputs.fleet_id }}
          platform: ${{ inputs.platform }}
          page: ${{ inputs.page }}
          per_page: ${{ inputs.per_page }}
  returns: ${{ steps.policy_hosts.result.data }}
