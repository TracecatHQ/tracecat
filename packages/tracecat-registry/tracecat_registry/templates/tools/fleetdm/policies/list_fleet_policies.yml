type: action
definition:
  title: List fleet policies
  description: List the compliance policies scoped to a single fleet (team).
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-fleet-level-policies
  namespace: tools.fleetdm
  name: list_fleet_policies
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    fleet_id:
      type: int
      description: Numeric Fleet (team) ID.
    merge_inherited:
      type: bool | None
      description: Include global policies inherited by the fleet.
      default: null
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            merge_inherited: ${{ inputs.merge_inherited }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: fleet_policies
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/fleets/${{ inputs.fleet_id }}/policies
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.fleet_policies.result.data }}
