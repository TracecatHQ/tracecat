type: action
definition:
  title: List MDM commands
  description: List MDM commands that have been issued, optionally filtered by host and status.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-mdm-commands
  namespace: tools.fleetdm
  name: list_mdm_commands
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_identifier:
      type: str
      description: Host hostname, UUID, or hardware serial to scope commands to (required by Fleet; omitting it is deprecated and removed in Fleet 5).
    request_type:
      type: str | None
      description: Filter by MDM command request type (e.g. DeviceLock, EraseDevice).
      default: null
    command_status:
      type: str | None
      description: Filter by command status (ran, pending, failed).
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Commands per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: build_params
      action: core.script.run_python
      args:
        inputs:
          params:
            host_identifier: ${{ inputs.host_identifier }}
            request_type: ${{ inputs.request_type }}
            command_status: ${{ inputs.command_status }}
            page: ${{ inputs.page }}
            per_page: ${{ inputs.per_page }}
        script: |
          def main(params):
              return {k: v for k, v in params.items() if v is not None}
    - ref: list_commands
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/commands
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params: ${{ steps.build_params.result }}
  returns: ${{ steps.list_commands.result.data }}
