type: action
definition:
  title: List configuration profiles
  description: List the MDM configuration profiles defined in Fleet.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#list-custom-os-settings-configuration-profiles
  namespace: tools.fleetdm
  name: list_configuration_profiles
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    fleet_id:
      type: int | None
      description: Scope profiles to a fleet (team) ID.
      default: null
    page:
      type: int
      description: Page number to retrieve (0-indexed).
      default: 0
    per_page:
      type: int
      description: Profiles per page (Fleet caps at 200).
      default: 50
  steps:
    - ref: list_profiles
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/configuration_profiles
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          fleet_id: ${{ inputs.fleet_id }}
          page: ${{ inputs.page }}
          per_page: ${{ inputs.per_page }}
  returns: ${{ steps.list_profiles.result.data }}
