type: action
definition:
  title: Get host MDM
  description: Get the MDM enrollment status and server URL for a host.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-host-s-mdm-information
  namespace: tools.fleetdm
  name: get_host_mdm
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_id:
      type: int
      description: Numeric Fleet host ID.
  steps:
    - ref: host_mdm
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/${{ inputs.host_id }}/mdm
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
  returns: ${{ steps.host_mdm.result.data }}
