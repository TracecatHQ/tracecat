type: action
definition:
  title: Get MDM command results
  description: Get the execution results and status for a previously enqueued MDM command.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-mdm-command-results
  namespace: tools.fleetdm
  name: get_mdm_command_results
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    command_uuid:
      type: str
      description: UUID of the MDM command returned when it was enqueued.
  steps:
    - ref: command_results
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/commands/results
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          command_uuid: ${{ inputs.command_uuid }}
  returns: ${{ steps.command_results.result.data }}
