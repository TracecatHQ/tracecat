type: action
definition:
  title: Get OS settings summary
  description: Get aggregate OS settings status counts (verified, verifying, pending, failed).
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#get-os-settings-status
  namespace: tools.fleetdm
  name: get_os_settings_summary
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    fleet_id:
      type: int | None
      description: Scope the summary to a fleet (team) ID.
      default: null
  steps:
    - ref: settings_summary
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/configuration_profiles/summary
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
        params:
          fleet_id: ${{ inputs.fleet_id }}
  returns: ${{ steps.settings_summary.result.data }}
