type: action
definition:
  title: Unlock host
  description: Unlock a previously locked host, or retrieve its macOS unlock PIN.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#unlock-host
  namespace: tools.fleetdm
  name: unlock_host
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_id:
      type: int
      description: Numeric Fleet host ID.
  steps:
    - ref: unlock_host
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/${{ inputs.host_id }}/unlock
        method: POST
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
  returns: ${{ steps.unlock_host.result.data }}
