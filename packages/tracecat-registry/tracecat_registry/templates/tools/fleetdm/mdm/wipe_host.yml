type: action
definition:
  title: Wipe host
  description: Remotely wipe a host via MDM, erasing its data.
  display_group: Fleet
  doc_url: https://fleetdm.com/docs/rest-api/rest-api#wipe-host
  namespace: tools.fleetdm
  name: wipe_host
  secrets:
    - name: fleetdm
      keys: ["FLEETDM_API_TOKEN"]
  expects:
    base_url:
      type: str
      description: Fleet server base URL (e.g. https://fleet.example.com).
    host_id:
      type: int
      description: Numeric Fleet host ID.
    wipe_type:
      type: str | None
      description: For Windows, the wipe type (doWipe or doWipeProtected).
      default: null
  steps:
    - ref: build_payload
      action: core.script.run_python
      args:
        inputs:
          wipe_type: ${{ inputs.wipe_type }}
        script: |
          def main(wipe_type):
              if wipe_type is not None:
                  return {"windows": {"wipe_type": wipe_type}}
              return {}
    - ref: wipe_host
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/api/v1/fleet/hosts/${{ inputs.host_id }}/wipe
        method: POST
        headers:
          Authorization: Bearer ${{ SECRETS.fleetdm.FLEETDM_API_TOKEN }}
          Content-Type: application/json
        payload: ${{ steps.build_payload.result }}
  returns: ${{ steps.wipe_host.result.data }}
