type: action
definition:
  title: Create incident comment
  description: Create a comment on an incident in Microsoft Sentinel.
  display_group: Microsoft Sentinel
  doc_url: https://learn.microsoft.com/en-us/rest/api/securityinsights/incident-comments/create-or-update?view=rest-securityinsights-2025-09-01
  namespace: tools.microsoft_sentinel
  name: create_incident_comment
  secrets:
    - type: oauth
      provider_id: microsoft_sentinel
      grant_type: authorization_code
      optional: true
    - type: oauth
      provider_id: microsoft_sentinel
      grant_type: client_credentials
      optional: true
  expects:
    subscription_id:
      type: str
      description: Azure subscription ID.
    resource_group_name:
      type: str
      description: Azure resource group name.
    workspace_name:
      type: str
      description: Log Analytics workspace name.
    incident_id:
      type: str
      description: Incident ID.
    comment_id:
      type: str
      description: Comment ID (GUID).
    message:
      type: str
      description: Comment message text.
    api_version:
      type: str
      description: API version.
      default: "2025-09-01"
    base_url:
      type: enum["https://management.azure.com", "https://management.usgovcloudapi.net"]
      description: Base URL for the Azure Management API.
      default: https://management.azure.com
  steps:
    - ref: normalize_ids
      action: core.script.run_python
      args:
        inputs:
          incident_id: ${{ inputs.incident_id }}
          comment_id: ${{ inputs.comment_id }}
        script: |
          def leaf(value):
              return str(value).rstrip("/").split("/")[-1]

          def main(incident_id, comment_id):
              return {
                  "incident_id": leaf(incident_id),
                  "comment_id": leaf(comment_id),
              }
    - ref: create_comment
      action: core.http_request
      args:
        url: ${{ inputs.base_url }}/subscriptions/${{ FN.url_encode(inputs.subscription_id) }}/resourceGroups/${{ FN.url_encode(inputs.resource_group_name) }}/providers/Microsoft.OperationalInsights/workspaces/${{ FN.url_encode(inputs.workspace_name) }}/providers/Microsoft.SecurityInsights/incidents/${{ FN.url_encode(steps.normalize_ids.result.incident_id) }}/comments/${{ FN.url_encode(steps.normalize_ids.result.comment_id) }}
        method: PUT
        headers:
          Authorization: Bearer ${{ SECRETS.microsoft_sentinel_oauth.MICROSOFT_SENTINEL_USER_TOKEN || SECRETS.microsoft_sentinel_oauth.MICROSOFT_SENTINEL_SERVICE_TOKEN }}
          Content-Type: application/json
        params:
          api-version: ${{ inputs.api_version }}
        payload:
          properties:
            message: ${{ inputs.message }}
  returns: ${{ steps.create_comment.result.data }}
