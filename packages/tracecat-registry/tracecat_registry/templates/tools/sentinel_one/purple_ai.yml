type: action
definition:
  title: Ask Purple AI
  description: Ask SentinelOne Purple AI a natural-language security question. Returns a message or a generated PowerQuery.
  display_group: SentinelOne
  doc_url: https://github.com/Sentinel-One/purple-mcp
  namespace: tools.sentinel_one
  name: purple_ai
  secrets:
    - name: sentinel_one
      keys: ["SENTINEL_ONE_API_TOKEN"]
  expects:
    question:
      type: str
      description: Natural-language question to ask Purple AI.
    console_id:
      type: str | None
      description: Console (deployment) ID. Defaults to the token's own scope when omitted.
      default: null
    tenant_id:
      type: str | None
      description: Tenant scope ID.
      default: null
    account_id:
      type: str | None
      description: Account scope ID.
      default: null
    site_id:
      type: str | None
      description: Site scope ID.
      default: null
    version:
      type: str | None
      description: Console version string.
      default: null
    start_time:
      type: int | None
      description: Start of the displayed time range in epoch milliseconds. Defaults to 24 hours ago.
      default: null
    end_time:
      type: int | None
      description: End of the displayed time range in epoch milliseconds. Defaults to now.
      default: null
    timeout_seconds:
      type: float
      description: HTTP timeout in seconds for the Purple AI request.
      default: 120
    base_url:
      type: str | None
      description: SentinelOne console URL.
      default: null
  steps:
    - ref: build_query
      action: core.script.run_python
      args:
        inputs:
          base_url: ${{ inputs.base_url || VARS.sentinel_one.base_url }}
          console_id: ${{ inputs.console_id }}
          tenant_id: ${{ inputs.tenant_id }}
          account_id: ${{ inputs.account_id }}
          site_id: ${{ inputs.site_id }}
          version: ${{ inputs.version }}
          start_time: ${{ inputs.start_time }}
          end_time: ${{ inputs.end_time }}
        script: |
          import json
          import secrets
          import string
          import time
          import uuid
          from datetime import datetime

          def main(
              base_url,
              console_id,
              tenant_id,
              account_id,
              site_id,
              version,
              start_time,
              end_time,
          ):
              now_ms = int(time.time() * 1000)
              end = end_time if end_time is not None else now_ms
              start = start_time if start_time is not None else now_ms - 24 * 60 * 60 * 1000
              conversation_id = "PURPLE-MCP" + "".join(
                  secrets.choice(string.ascii_letters + string.digits)
                  for _ in range(10)
              )
              session_id = uuid.uuid4().hex
              user_time = datetime.now().astimezone().isoformat()

              # Identical tenant-details block is required at both request.tenantDetails
              # and request.inputContent.tenantDetails. All dynamic values are escaped
              # with json.dumps so None becomes the literal null.
              tenant_details = (
                  "tenantDetails: { "
                  "userDetails: { "
                  f"sessionId: {json.dumps(session_id)} emailAddress: null "
                  f"userAgent: {json.dumps('tracecat')} "
                  "buildDate: null buildHash: null "
                  f"userTime: {json.dumps(user_time)} "
                  "} "
                  "consoleDetails: { "
                  f"consoleId: {json.dumps(console_id)} "
                  f"tenantId: {json.dumps(tenant_id)} "
                  f"accountId: {json.dumps(account_id)} "
                  f"siteId: {json.dumps(site_id)} "
                  f"baseUrl: {json.dumps(base_url)} "
                  f"version: {json.dumps(version)} "
                  "} "
                  "}"
              )

              return (
                  "query SimpleTestQuery($input: String!) { "
                  "purpleLaunchQuery(request: { "
                  "isAsync: false contentType: NATURAL_LANGUAGE "
                  f"{tenant_details} "
                  f"conversation: {{ id: {json.dumps(conversation_id)}, messages: [], entitlements: null }} "
                  "inputContent: { "
                  "userInput: $input "
                  f"displayedTimeRange: {{ start: {start}, end: {end} }} "
                  "viewSelector: EDR contentType: NATURAL_LANGUAGE "
                  f"{tenant_details} "
                  "} "
                  "}) { "
                  "result { message summary "
                  "powerQuery { query timeRange { start end } viewSelector } "
                  "starRule suggestedActions { payload label actionId } "
                  "suggestedQuestions { powerQuery question } maskedMetadata } "
                  "resultType "
                  "status { state error { errorDetail errorType origin } } "
                  "stepsCompleted token "
                  "} }"
              )
    - ref: ask_purple
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.sentinel_one.base_url }}/web/api/v2.1/graphql
        method: POST
        headers:
          Authorization: "ApiToken ${{ SECRETS.sentinel_one.SENTINEL_ONE_API_TOKEN }}"
          Content-Type: application/json
          Accept: application/json
        payload:
          query: ${{ steps.build_query.result }}
          variables:
            input: ${{ inputs.question }}
        timeout: ${{ inputs.timeout_seconds }}
  returns: ${{ steps.ask_purple.result.data }}