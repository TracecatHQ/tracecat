type: action
definition:
  title: Get PowerQuery results
  description: Poll a SentinelOne SDL PowerQuery for status and incremental results.
  display_group: SentinelOne
  doc_url: https://github.com/Sentinel-One/purple-mcp
  namespace: tools.sentinel_one
  name: get_powerquery_results
  secrets:
    - name: sentinel_one
      keys: ["SENTINEL_ONE_API_TOKEN"]
  expects:
    query_id:
      type: str
      description: SDL query ID returned by submit_powerquery.
    forward_tag:
      type: str
      description: X-Dataset-Query-Forward-Tag returned by submit_powerquery response headers.
    last_step_seen:
      type: int
      description: Last step seen for incremental polling.
      default: 0
    base_url:
      type: str | None
      description: SentinelOne tenant URL. /sdl is appended automatically.
      default: null
  steps:
    - ref: get_results
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.sentinel_one.base_url }}/sdl/v2/api/queries/${{ inputs.query_id }}
        method: GET
        headers:
          Authorization: Bearer ${{ SECRETS.sentinel_one.SENTINEL_ONE_API_TOKEN }}
          X-Dataset-Query-Forward-Tag: ${{ inputs.forward_tag }}
        params:
          lastStepSeen: ${{ inputs.last_step_seen }}
  returns: ${{ steps.get_results.result.data }}
