type: action
definition:
  title: List inventory
  description: List SentinelOne inventory assets with API-native filters.
  display_group: SentinelOne
  doc_url: https://github.com/Sentinel-One/purple-mcp
  namespace: tools.sentinel_one
  name: list_inventory
  secrets:
    - name: sentinel_one
      keys: ["SENTINEL_ONE_API_TOKEN"]
  expects:
    filters:
      type: dict[str, Any]
      description: API-native query parameters to pass through, including limit and pagination cursor when supported.
      default: {}
    base_url:
      type: str | None
      description: SentinelOne tenant URL.
      default: null
  steps:
    - ref: list_items
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.sentinel_one.base_url }}/web/api/v2.1/assets
        method: GET
        headers:
          Authorization: "ApiToken ${{ SECRETS.sentinel_one.SENTINEL_ONE_API_TOKEN }}"
        params: ${{ inputs.filters }}
  returns: ${{ steps.list_items.result.data }}
