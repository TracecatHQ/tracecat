type: action
definition:
  title: Get alert history
  description: Get activity history for a SentinelOne alert.
  display_group: SentinelOne
  doc_url: https://github.com/Sentinel-One/purple-mcp
  namespace: tools.sentinel_one
  name: get_alert_history
  secrets:
    - name: sentinel_one
      keys: ["SENTINEL_ONE_API_TOKEN"]
  expects:
    alert_id:
      type: str
      description: SentinelOne alert ID.
    base_url:
      type: str | None
      description: SentinelOne tenant URL.
      default: null
  steps:
    - ref: get_history
      action: core.http_request
      args:
        url: ${{ inputs.base_url || VARS.sentinel_one.base_url }}/web/api/v2.1/cloud-detection/alerts/${{ inputs.alert_id }}/history
        method: GET
        headers:
          Authorization: "ApiToken ${{ SECRETS.sentinel_one.SENTINEL_ONE_API_TOKEN }}"
  returns: ${{ steps.get_history.result.data }}
