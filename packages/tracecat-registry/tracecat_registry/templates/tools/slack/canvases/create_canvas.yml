type: action
definition:
  title: Create canvas
  description: Create a standalone Slack canvas.
  display_group: Slack
  doc_url: https://docs.slack.dev/reference/methods/canvases.create/
  namespace: tools.slack
  name: create_canvas
  expects:
    title:
      type: str | None
      description: Title of the newly created canvas.
      default: null
    document_content:
      type: dict[str, Any] | None
      description: Structure describing the type and value of the content to create.
      default: null
    channel_id:
      type: str | None
      description: ID of the channel where the canvas should be tabbed.
      default: null
  steps:
    - ref: create_canvas
      action: tools.slack_sdk.call_method
      args:
        sdk_method: canvases.create
        params:
          title: ${{ inputs.title }}
          document_content: ${{ inputs.document_content }}
          channel_id: ${{ inputs.channel_id }}
  returns: ${{ steps.create_canvas.result }}
