type: action
definition:
  title: Edit canvas
  description: Update an existing Slack canvas.
  display_group: Slack
  doc_url: https://docs.slack.dev/reference/methods/canvases.edit/
  namespace: tools.slack
  name: edit_canvas
  expects:
    canvas_id:
      type: str
      description: Encoded ID of the canvas to update.
    changes:
      type: list[dict[str, Any]]
      description: List of changes to apply to the canvas.
  steps:
    - ref: edit_canvas
      action: tools.slack_sdk.call_method
      args:
        sdk_method: canvases.edit
        params:
          canvas_id: ${{ inputs.canvas_id }}
          changes: ${{ inputs.changes }}
  returns: ${{ steps.edit_canvas.result }}
