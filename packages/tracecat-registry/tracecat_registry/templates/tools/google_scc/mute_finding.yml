type: action
definition:
  title: Mute finding
  description: Set the mute status of a Security Command Center finding.
  display_group: Google Security Command Center
  doc_url: https://cloud.google.com/security-command-center/docs/reference/rest/v2/organizations.sources.findings/setMute
  namespace: tools.google_scc
  name: mute_finding
  expects:
    finding_name:
      type: str
      description: >
        Full finding resource name, e.g.
        `organizations/{org}/sources/{src}/locations/{loc}/findings/{id}`. The
        scope prefix decides which IAM permissions are checked, so pass
        `canonicalName` from `list_findings` if you hold project-level access;
        `name` is always organization-scoped.
    mute:
      type: str
      description: >
        New mute state: `MUTED`, `UNMUTED`, or `UNDEFINED` (no explicit decision).
  steps:
    - ref: build_resource
      action: core.script.run_python
      args:
        inputs:
          finding_name: ${{ inputs.finding_name }}
        script: |
          SCOPE_TYPES = ("organizations", "folders", "projects")

          def main(finding_name):
              # SCC v2 finding names are location-qualified, e.g.
              # organizations/{org}/sources/{src}/locations/{loc}/findings/{id}
              # Those are served by the `...sources.locations.findings` resource;
              # the non-location resource rejects them via its `name` pattern.
              scope_type, _, rest = finding_name.partition("/")
              if scope_type not in SCOPE_TYPES or "/findings/" not in rest:
                  raise ValueError(
                      "`finding_name` must be a full finding resource name, e.g. "
                      "organizations/{org}/sources/{src}/locations/{loc}/findings/{id}. "
                      f"Got: {finding_name!r}"
                  )
              if "/locations/" in rest:
                  return f"{scope_type}.sources.locations.findings"
              return f"{scope_type}.sources.findings"
    - ref: set_mute
      action: tools.google_api.call_api
      args:
        service_name: securitycenter
        version: v2
        resource: ${{ steps.build_resource.result }}
        method_name: setMute
        static_discovery: false
        params:
          name: ${{ inputs.finding_name }}
          body:
            mute: ${{ inputs.mute }}
  returns: ${{ steps.set_mute.result }}
