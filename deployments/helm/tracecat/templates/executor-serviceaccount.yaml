{{- if .Values.executor.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tracecat.executorServiceAccountName" . }}
  labels:
    {{- include "tracecat.labels" . | nindent 4 }}
  {{- with .Values.executor.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
