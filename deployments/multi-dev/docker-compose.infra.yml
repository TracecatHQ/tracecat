name: tracecat-infra

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    command: ["postgres", "-c", "shared_buffers=128MB"]
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${TRACECAT__POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${TRACECAT__POSTGRES_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      shared:
        aliases:
          - tracecat-shared-postgres

  temporal:
    image: temporalio/temporal:1.8.0
    restart: unless-stopped
    # The image runs as uid 1000 (temporal), but a fresh named volume mounted
    # at /data is root-owned, so the dev server cannot create its SQLite file.
    user: root
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --db-filename
      - /data/temporal.db
    ports:
      - "127.0.0.1:${TEMPORAL_PORT:-7233}:7233"
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8233}:8233"
    volumes:
      - temporal-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "temporal",
          "operator",
          "cluster",
          "health",
          "--address",
          "localhost:7233",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      shared:
        aliases:
          - tracecat-shared-temporal

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      shared:
        aliases:
          - tracecat-shared-minio

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      shared:
        aliases:
          - tracecat-shared-redis

volumes:
  postgres-data:
  temporal-data:
  minio-data:
  redis-data:

networks:
  shared:
    name: tracecat-multi-dev
