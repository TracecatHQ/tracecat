issuer: {{ .Env.DEX_ISSUER | quote }}
{{- $mode := .Env.MCP_DEX_MODE }}
{{- if not $mode }}
  {{- $mode = "" }}
{{- end }}
{{- $bootstrapEmail := .Env.TRACECAT__AUTH_SUPERADMIN_EMAIL }}
{{- $bootstrapHash := .Env.MCP_DEX_BOOTSTRAP_PASSWORD_HASH }}
{{- $idTokenTTL := .Env.DEX_ID_TOKEN_TTL }}
{{- if and (eq $mode "saml") .Env.DEX_SAML_ID_TOKEN_TTL }}
  {{- $idTokenTTL = .Env.DEX_SAML_ID_TOKEN_TTL }}
{{- end }}

storage:
  type: sqlite3
  config:
    file: {{ .Env.DEX_STORAGE_PATH | quote }}

web:
  http: {{ .Env.DEX_HTTP_ADDR | quote }}

grpc:
  addr: {{ .Env.DEX_GRPC_ADDR | quote }}

oauth2:
  skipApprovalScreen: true
{{- if eq $mode "basic" }}

enablePasswordDB: true
{{- if and $bootstrapEmail $bootstrapHash }}
staticPasswords:
  - email: {{ $bootstrapEmail | quote }}
    hash: {{ $bootstrapHash | quote }}
    username: {{ $bootstrapEmail | quote }}
    userID: {{ $bootstrapEmail | quote }}
{{- end }}
{{- end }}

expiry:
  idTokens: {{ $idTokenTTL | quote }}
  refreshTokens:
    validIfNotUsedFor: {{ .Env.DEX_REFRESH_IDLE_TTL | quote }}
    absoluteLifetime: {{ .Env.DEX_REFRESH_ABSOLUTE_TTL | quote }}
    reuseInterval: {{ .Env.DEX_REFRESH_REUSE_INTERVAL | quote }}

staticClients:
  - id: {{ .Env.DEX_TRACECAT_CLIENT_ID | quote }}
    name: Tracecat
    secret: {{ .Env.DEX_TRACECAT_CLIENT_SECRET | quote }}
    redirectURIs:
      - {{ .Env.DEX_TRACECAT_MCP_REDIRECT_URI | quote }}
      {{- if .Env.DEX_TRACECAT_MCP_REDIRECT_URI_ALT }}
      - {{ .Env.DEX_TRACECAT_MCP_REDIRECT_URI_ALT | quote }}
      {{- end }}

{{- if eq $mode "saml" }}
connectors:
  - type: saml
    id: "upstream-saml"
    name: "Upstream SAML"
    config:
      ssoURL: {{ .Env.MCP_DEX_SAML_SSO_URL | quote }}
      caData: {{ .Env.DEX_SAML_CA_DATA_B64 | quote }}
      redirectURI: {{ .Env.DEX_UPSTREAM_REDIRECT_URI | quote }}
      usernameAttr: {{ or .Env.MCP_DEX_SAML_USERNAME_ATTR "email" | quote }}
      emailAttr: {{ or .Env.MCP_DEX_SAML_EMAIL_ATTR "email" | quote }}
      {{- if .Env.MCP_DEX_SAML_SSO_ISSUER }}
      ssoIssuer: {{ .Env.MCP_DEX_SAML_SSO_ISSUER | quote }}
      {{- end }}
      {{- if .Env.MCP_DEX_SAML_GROUPS_ATTR }}
      groupsAttr: {{ .Env.MCP_DEX_SAML_GROUPS_ATTR | quote }}
      {{- end }}
{{- else if eq $mode "oidc" }}
connectors:
  - type: oidc
    id: propelauth
    name: PropelAuth
    config:
      issuer: {{ .Env.OIDC_ISSUER | quote }}
      clientID: {{ .Env.OIDC_CLIENT_ID | quote }}
      clientSecret: {{ .Env.OIDC_CLIENT_SECRET | quote }}
      redirectURI: {{ .Env.DEX_UPSTREAM_REDIRECT_URI | quote }}
      promptType: "login"
      getUserInfo: true
      userNameKey: email
      scopes:
        - profile
        - email
        - offline_access
{{- end }}
